__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  '../dfine/include/dataloader.yml',
  '../dfine/include/optimizer.yml',
  '../dfine/include/dfine_hgnetv2.yml',
]

output_dir: ./output/baseline_dfine_s


DFINE:
  backbone: HGNetv2

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

DFINETransformer:
  num_layers: 3  # 4 5 6
  eval_idx: -1  # -2 -3 -4

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0001
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0001
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0002
  betas: [0.9, 0.999]
  weight_decay: 0.0001


# Increase to search for the optimal ema
epochs: 60
train_dataloader:
  dataset:
    img_folder: data/train/images/
    ann_file: dataset/annotations/instances_train.json
    transforms:
      policy:
        epoch: 60
  collate_fn:
    stop_epoch: 60
    ema_restart_decay: 0.9999
    base_size_repeat: 20

val_dataloader:
  dataset:
    img_folder: data/valid/images/
    ann_file: dataset/annotations/instances_val.json

num_classes: 8

remap_mscoco_category: False
