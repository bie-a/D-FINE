__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  '../dfine/include/dataloader.yml',
  '../dfine/include/optimizer.yml',
  '../dfine/include/dfine_hgnetv2.yml',
]

output_dir: improved_dfine_s   # 建议改成这个，虽然命令行也会覆盖


DFINE:
  backbone: FasterNetBackbone

HGNetv2:
  pretrained: False

DFINETransformer:
  num_layers: 3  # 4 5 6
  eval_idx: -1  # -2 -3 -4

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0001
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0001
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0002
  betas: [0.9, 0.999]
  weight_decay: 0.0001


# Increase to search for the optimal ema
epochs: 80
train_dataloader:
  total_batch_size: 4
  dataset:
    img_folder: data/train/images/
    ann_file: dataset/annotations/instances_train.json
    transforms:
      policy:
        epoch: 80
  collate_fn:
    stop_epoch: 80
    ema_restart_decay: 0.9999
    base_size_repeat: 20

val_dataloader:
  total_batch_size: 4
  dataset:
    img_folder: data/valid/images/
    ann_file: dataset/annotations/instances_val.json

num_classes: 8

remap_mscoco_category: False

FasterNetBackbone:
  _name: FasterNetBackbone
  width_mul: 1.0            # 可以不加，默认1.0
  depths: [2, 2, 8, 2]
  channels: [64, 128, 256, 512]   # 回归标准轻量通道